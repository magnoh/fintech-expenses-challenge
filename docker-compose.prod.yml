version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fintech_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_pwd}
      POSTGRES_DB: ${DB_NAME:-fintech_expenses_prod}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech_backend_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres_secure_pwd}
      - DB_NAME=${DB_NAME:-fintech_expenses_prod}
      - DB_SYNCHRONIZE=false
      - JWT_SECRET=${JWT_SECRET:-some_super_production_secret_key}
      - JWT_EXPIRES_IN=1d
      - PORT=3000
    depends_on:
      - db
    # Comando de inicialização para rodar migrations primeiro e depois iniciar o servidor
    command: sh -c "npm run migration:run && node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintech_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
